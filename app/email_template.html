<html>
<body style="font-family: 'Microsoft YaHei', sans-serif; color: #333; line-height: 1.6; background-color: #f4f7f9; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <div style="background-color: #ef4444; color: white; padding: 25px; text-align: center;">
            <h2 style="margin: 0; font-size: 24px;">⚠️ SaleorQA 自动化告警</h2>
        </div>
        <div style="padding: 30px;">
            <p style="font-size: 16px; color: #1f2937;">系统检测到测试任务执行异常，详情如下：</p>
            
            <table style="width: 100%; margin: 20px 0; border-collapse: collapse;">
                <tr>
                    <td style="padding: 10px 0; color: #6b7280; width: 100px; border-bottom: 1px solid #f3f4f6;">测试脚本:</td>
                    <td style="padding: 10px 0; font-weight: bold; border-bottom: 1px solid #f3f4f6;">{{script_id}}</td>
                </tr>
                <tr>
                    <td style="padding: 10px 0; color: #6b7280; border-bottom: 1px solid #f3f4f6;">执行时间:</td>
                    <td style="padding: 10px 0; border-bottom: 1px solid #f3f4f6;">{{time}}</td>
                </tr>
            </table>
            
            <div style="margin-top: 20px; background-color: #fff1f2; border-radius: 8px; padding: 15px; border: 1px solid #fecaca;">
                <strong style="color: #991b1b; display: block; margin-bottom: 8px;">错误摘要 (Last Logs):</strong>
                <pre style="white-space: pre-wrap; font-size: 12px; color: #b91c1c; margin: 0; font-family: 'Fira Code', monospace;">{{summary}}</pre>
            </div>

            <div style="margin-top: 35px; text-align: center;">
                <a href="{{report_url}}" style="background-color: #2563eb; color: white; padding: 14px 30px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block;">查看完整测试报告</a>
            </div>
        </div>
        <div style="background-color: #f9fafb; color: #9ca3af; padding: 20px; text-align: center; font-size: 12px; border-top: 1px solid #f3f4f6;">
            本邮件由 SaleorQA 监控引擎自动生成 • {{platform}}
        </div>
    </div>
</body>
</html>
